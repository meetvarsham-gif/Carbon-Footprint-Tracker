<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Core AI - History Logs</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    if (!localStorage.getItem("currentUser")) window.location.href = "auth.html";
  </script>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar">
      <div>
        <div class="brand">⚡ ECO-CORE AI <span>v2.6</span></div>
        <ul class="nav-menu">
          <li><a href="Index.html" class="nav-item">🛰️ Dashboard</a></li>
          <li><a href="history.html" class="nav-item active">📊 Tracking History</a></li>
          <li><a href="tips.html" class="nav-item">⚡ AI Recommendations</a></li>
          <li><a href="profile.html" class="nav-item">🎛️ Settings</a></li>
        </ul>
      </div>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div>
          <h2>Tracking History Logs</h2>
          <p style="color:var(--text-muted)">Review your previous calculations and carbon log entries.</p>
        </div>
        <button class="btn-danger" id="clearHistoryBtn">Clear History</button>
      </div>

      <div class="card" style="padding:0;">
        <div id="historyListContainer">
          <p style="padding:3rem; color:var(--text-muted); text-align:center; font-family:var(--font-display)">[ NO TELEMETRY FOUND ]</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const username = localStorage.getItem("currentUser");
      const historyKey = `carbonHistory_${username}`;
      const records = JSON.parse(localStorage.getItem(historyKey) || "[]");
      const container = document.getElementById("historyListContainer");

      if(records.length > 0) {
        container.innerHTML = "";
        records.reverse().forEach(item => {
          const row = document.createElement('div');
          row.className = "history-item";
          row.innerHTML = `
            <div>
              <span style="color:var(--neon-cyan); font-family:var(--font-display)">📅 LOG DATE // ${item.date}</span> 
              <span style="color:var(--text-muted); margin-left: 10px;">— Travel: ${item.kmPerDay} km/d | Electricity: ${item.electricity} kWh | Diet: ${item.diet}</span>
            </div>
            <div style="font-weight:700; color: var(--neon-cyan); font-family: var(--font-display); text-shadow: 0 0 8px rgba(0,242,254,0.4)">
              + ${item.footprint} TONS CO₂
            </div>
          `;
          container.appendChild(row);
        });
      }

      document.getElementById("clearHistoryBtn").addEventListener("click", () => {
        if(confirm("Are you sure you want to delete all historical logs?")) {
          localStorage.removeItem(historyKey);
          window.location.reload();
        }
      });
    });
  </script>
</body>
</html>
